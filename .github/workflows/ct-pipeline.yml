name: Continuous Training (CT) Pipeline

on:
  # Pemicu 1: Aktif (Grafana Webhook Alert melalui Repository Dispatch)
  repository_dispatch:
    types: [model_drift_alert] # Dipicu saat tebakan model di Grafana mengalami pergeseran ekstrem

  # Pemicu 2: Pasif (Terjadwal otomatis setiap hari Minggu pukul 00:00 WIB / 19:00 UTC)
  schedule:
    - cron: '0 19 * * 0'

jobs:
  continual_learning:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Menarik dataset terbaru yang telah dilacak oleh DVC
    - name: Fetch Latest Data via DVC
      run: |
        dvc pull data/processed/
      env:
        DVC_STUDIO_TOKEN: ${{ secrets.DVC_STUDIO_TOKEN }} # Jika menggunakan DVC Remote cloud

    # Melatih ulang model secara otomatis (Stateless Training)
    - name: Executing Model Retraining
      run: |
        python src/modeling/train.py
      env:
        MLFLOW_TRACKING_URI: http://localhost:5000 # Disesuaikan dengan URL server MLflow internal

    # Evaluasi Otomatis (Menerapkan prinsip Champion vs Challenger)
    - name: Evaluate and Validate Model
      run: |
        python src/modeling/validate.py