name: End-to-End MLOps Pipeline

# Konfigurasi Pemicu (Trigger)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest mlflow xgboost pandas scikit-learn dvc
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Tahap 1 - Automated Testing (Unit Test)
      run: |
        echo "Menjalankan verifikasi integritas kode..."
        pytest tests/

    - name: Tahap 2, 3 & 4 - Automated Training, Evaluation, & Registry
      run: |
        echo "Menjalankan skrip pelatihan dan validasi metrik otomatis..."
        python src/modeling/train.py